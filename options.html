<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Switcher — 设置</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .container { width: 100%; max-width: 580px; }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .header img { width: 48px; height: 48px; border-radius: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 13px; color: #6e6e73; margin-top: 2px; }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 24px 28px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #6e6e73;
      margin-bottom: 18px;
    }

    /* 模式选择 */
    .mode-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .mode-option { position: relative; cursor: pointer; }
    .mode-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .mode-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 18px 14px;
      border: 2px solid #e5e5ea;
      border-radius: 14px;
      transition: border-color .15s, background .15s, box-shadow .15s;
      user-select: none;
    }
    .mode-option input:checked + .mode-card {
      border-color: #0071e3;
      background: #f0f6ff;
      box-shadow: 0 0 0 3px rgba(0,113,227,.12);
    }
    .mode-option input:checked + .mode-card .mode-label { color: #0071e3; }

    .diagram { width: 100%; max-width: 160px; }
    .mode-label { font-size: 14px; font-weight: 600; color: #1d1d1f; transition: color .15s; }
    .mode-sublabel { font-size: 11px; color: #6e6e73; text-align: center; line-height: 1.5; }

    /* Keymap 表格 */
    .keymap { width: 100%; border-collapse: collapse; }
    .keymap thead th {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .6px; color: #8e8e93; padding: 0 0 10px; text-align: left;
    }
    .keymap thead th:last-child { text-align: right; }
    .keymap tbody tr { border-top: 1px solid #f0f0f2; }
    .keymap tbody td { padding: 12px 0; vertical-align: middle; }
    .keymap tbody td:last-child { text-align: right; }

    .action-name { font-size: 14px; font-weight: 500; }
    .action-desc { font-size: 12px; color: #6e6e73; margin-top: 2px; }

    .key-badge { display: inline-flex; align-items: center; gap: 3px; }
    .key {
      display: inline-flex; align-items: center; justify-content: center;
      background: #f5f5f7; border: 1px solid #d2d2d7; border-bottom: 2px solid #b8b8be;
      border-radius: 6px; padding: 3px 8px; font-size: 13px; font-weight: 500;
      min-width: 28px; height: 28px; white-space: nowrap;
    }
    .key-sep { font-size: 10px; color: #aeaeb2; }
    .key-unset { font-size: 12px; color: #aeaeb2; }

    .notice {
      background: #fff9ec;
      border: 1px solid #fde68a;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .notice-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .notice p { font-size: 13px; color: #92400e; line-height: 1.5; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      background: #0071e3; color: #fff; border: none; border-radius: 10px;
      padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background .15s; width: 100%; margin-top: 14px;
    }
    .btn:hover  { background: #0077ed; }
    .btn:active { background: #006edb; }

    .footer { text-align: center; font-size: 12px; color: #aeaeb2; margin-top: 8px; }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1d1d1f; color: #fff; font-size: 13px; font-weight: 500;
      padding: 9px 20px; border-radius: 100px; opacity: 0;
      transition: opacity .2s, transform .2s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <img src="icon.png" alt="icon" />
    <div>
      <h1>Tab Switcher</h1>
      <p>快捷键设置</p>
    </div>
  </div>

  <!-- 模式选择 -->
  <div class="card">
    <div class="card-title">我的标签栏布局</div>
    <div class="mode-picker">

      <label class="mode-option">
        <input type="radio" name="mode" value="horizontal" />
        <div class="mode-card">
          <svg class="diagram" viewBox="0 0 160 82" fill="none">
            <rect x="1" y="1" width="158" height="80" rx="7" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1.5"/>
            <rect x="1" y="1" width="158" height="20" rx="7" fill="#e5e5ea"/>
            <rect x="1" y="14" width="158" height="7" fill="#e5e5ea"/>
            <rect x="7"  y="4" width="38" height="12" rx="3.5" fill="#fff" stroke="#c7c7cc" stroke-width="1"/>
            <rect x="49" y="4" width="38" height="12" rx="3.5" fill="#0071e3"/>
            <rect x="91" y="4" width="38" height="12" rx="3.5" fill="#fff" stroke="#c7c7cc" stroke-width="1"/>
            <rect x="7" y="26" width="146" height="48" rx="4" fill="#fff" stroke="#e5e5ea"/>
            <text x="80" y="53" text-anchor="middle" font-size="16" fill="#0071e3">← →</text>
            <text x="80" y="67" text-anchor="middle" font-size="8" fill="#8e8e93">切换标签</text>
          </svg>
          <div class="mode-label">水平标签栏</div>
          <div class="mode-sublabel">← → 切换标签<br/>↑ ↓ 历史回溯</div>
        </div>
      </label>

      <label class="mode-option">
        <input type="radio" name="mode" value="vertical" />
        <div class="mode-card">
          <svg class="diagram" viewBox="0 0 160 82" fill="none">
            <rect x="1" y="1" width="158" height="80" rx="7" fill="#f5f5f7" stroke="#d2d2d7" stroke-width="1.5"/>
            <rect x="1" y="1" width="46" height="80" rx="7" fill="#e5e5ea"/>
            <rect x="39" y="1" width="8" height="80" fill="#e5e5ea"/>
            <rect x="5" y="5"  width="38" height="13" rx="3.5" fill="#fff" stroke="#c7c7cc" stroke-width="1"/>
            <rect x="5" y="22" width="38" height="13" rx="3.5" fill="#0071e3"/>
            <rect x="5" y="39" width="38" height="13" rx="3.5" fill="#fff" stroke="#c7c7cc" stroke-width="1"/>
            <rect x="52" y="5" width="102" height="70" rx="4" fill="#fff" stroke="#e5e5ea"/>
            <text x="103" y="43" text-anchor="middle" font-size="16" fill="#0071e3">↑ ↓</text>
            <text x="103" y="57" text-anchor="middle" font-size="8" fill="#8e8e93">切换标签</text>
          </svg>
          <div class="mode-label">垂直标签栏</div>
          <div class="mode-sublabel">↑ ↓ 切换标签<br/>← → 历史回溯</div>
        </div>
      </label>

    </div>
  </div>

  <!-- 当前映射预览 -->
  <div class="card">
    <div class="card-title">快捷键映射</div>
    <table class="keymap">
      <thead><tr><th>功能</th><th>按键</th></tr></thead>
      <tbody id="keymap-body"></tbody>
    </table>
  </div>

  <!-- 说明 -->
  <div class="notice">
    <div class="notice-icon">⚠️</div>
    <p>Chrome 限制每个扩展最多 4 个快捷键，两种模式共用同一组按键，在此切换后立即生效，无需重启。如需修改按键组合，点击下方按钮。</p>
  </div>

  <div class="card">
    <ol style="list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:10px">
      <li style="counter-increment:s;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#3a3a3c;line-height:1.5">
        <span style="flex-shrink:0;width:20px;height:20px;background:#0071e3;color:#fff;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center">1</span>
        点击下方按钮，打开 Chrome 扩展快捷键页面
      </li>
      <li style="counter-increment:s;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#3a3a3c;line-height:1.5">
        <span style="flex-shrink:0;width:20px;height:20px;background:#0071e3;color:#fff;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center">2</span>
        找到 <strong>Tab Switcher</strong>，点击输入框录入新的按键组合
      </li>
      <li style="counter-increment:s;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#3a3a3c;line-height:1.5">
        <span style="flex-shrink:0;width:20px;height:20px;background:#0071e3;color:#fff;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center">3</span>
        返回此页面刷新，即可看到更新后的映射
      </li>
    </ol>
    <button class="btn" id="open-shortcuts-btn">⌨️&nbsp; 打开快捷键设置</button>
  </div>

  <div class="footer">Tab Switcher v3.2</div>
</div>

<div class="toast" id="toast">已保存</div>
<script src="options.js"></script>
</body>
</html>
